# Naftiko capabilities profile for Clerk.io.
# Capabilities are derived from the Clerk.io REST API and Clerk.js client
# documentation at docs.clerk.io. They describe high-level workflows that
# integrators can use to ingest data and consume personalization output.
provider: clerk-io
name: Clerk.io
description: >-
  Clerk.io is an AI-driven e-commerce personalization platform offering
  product recommendations, search, and email marketing across an online
  retailer's storefront and CRM channels.
capabilities:
  - id: clerk-io.product.sync
    name: Sync product catalog
    description: Push or update the store's product catalog into Clerk.io for use in recommendations and search.
    inputs:
      - private-key
      - products
    outputs:
      - status
  - id: clerk-io.category.sync
    name: Sync category tree
    description: Push or update the store's category hierarchy used for category-page recommendations and filtered search.
    inputs:
      - private-key
      - categories
    outputs:
      - status
  - id: clerk-io.order.sync
    name: Sync order history
    description: Push transactional order data so the recommender can learn from co-purchase and conversion behavior.
    inputs:
      - private-key
      - orders
    outputs:
      - status
  - id: clerk-io.customer.sync
    name: Sync customer profiles
    description: Push customer profiles for use in email personalization and audience segmentation.
    inputs:
      - private-key
      - customers
    outputs:
      - status
  - id: clerk-io.recommendation.fetch
    name: Fetch recommendations
    description: Retrieve personalized product recommendations for a slot, product page, category, or visitor.
    inputs:
      - public-key
      - slot
      - context
    outputs:
      - recommendations
  - id: clerk-io.search.query
    name: Query on-site search
    description: Run a personalized on-site search query and return ranked product hits, facets, and suggestions.
    inputs:
      - public-key
      - query
      - filters
    outputs:
      - hits
      - facets
  - id: clerk-io.email.audience
    name: Build email audience
    description: Define or refresh an audience segment used for triggered or scheduled email campaigns.
    inputs:
      - private-key
      - audience-rules
    outputs:
      - audience-id
